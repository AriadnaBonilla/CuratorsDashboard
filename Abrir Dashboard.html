<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="2;url=http://localhost:3000/">
  <title>Curators Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    h1 { margin: 0 0 8px; font-size: 22px; color: #32363a; }
    p  { margin: 0 0 24px; color: #6b7280; font-size: 14px; }
    a  {
      display: inline-block;
      background: #0070f2;
      color: white;
      padding: 10px 28px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
    }
    a:hover { background: #0057c2; }
    small { display: block; margin-top: 16px; color: #9ca3af; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Curators Dashboard 2.0</h1>
    <p>Abriendo en 2 segundos…</p>
    <a href="http://localhost:3000/">Abrir ahora</a>
    <small>Asegúrate de que el servidor esté corriendo con <code>python3 server.py</code></small>
  </div>
</body>
</html>
